name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Get your code
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    # Step 2: Install Node
    - name: Install Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # Step 3: Install dependencies
    - name: Install dependencies
      run: npm install

    # Step 4: SonarCloud Scan
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # Step 5: Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Step 6: Build and Push Docker image
    - name: Build and Push Docker image
      run: |
        docker build -t ishini25/order-service:latest .
        docker push ishini25/order-service:latest

    # Step 7: SSH into EC2 and restart container
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: 51.21.181.2
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: MONGODB_URI,JWT_SECRET
        script: |
          docker stop $(docker ps -aq) || true
          docker rm $(docker ps -aq) || true
          docker pull ishini25/order-service:latest
          docker run -d -p 5000:5000 \
            -e PORT=5000 \
            -e MONGODB_URI='mongodb+srv://ishinictse:Ishini1234@cluster0.pf1tf1i.mongodb.net/orderservice' \
            -e JWT_SECRET="$JWT_SECRET" \
            -e ALLOWED_ORIGINS="http://localhost:3000,http://51.21.181.2:5000,http://localhost:5173" \
            -e BASE_URL="http://51.21.181.2:5000" \
            -e USER_SERVICE_URL="http://54.254.157.28:8080" \
            -e PRODUCT_SERVICE_URL="http://98.81.229.185:3000" \
            ishini25/order-service:latest
